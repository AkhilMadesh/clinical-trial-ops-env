name: clinical-trial-ops-env
version: "1.0.0"
description: >
  Clinical trial coordinator simulation for a fictional Phase II NSCLC oncology
  study (LUMINOS-201, drug: Velitinib). An AI agent processes patient cases
  requiring decisions on protocol eligibility, lab-based dose modifications,
  and serious adverse event (SAE) triage under FDA/ICH regulatory constraints.
  Novel domain with high real-world utility for pharma AI evaluation.

author: contest-submission
license: MIT
tags:
  - openenv
  - healthcare
  - pharma
  - clinical-trials
  - compliance
  - real-world
  - safety-critical
  - nlp
  - multi-constraint

tasks:
  - id: eligibility_screening
    difficulty: easy
    description: >
      Enroll or screen-fail 10 patient profiles against explicit
      protocol inclusion/exclusion criteria. Tests multi-field reading
      comprehension and clinical criterion matching.
    max_steps: 10
    expected_baseline_score: 0.86
    grader: env/graders/eligibility.py

  - id: lab_dose_management
    difficulty: medium
    description: >
      Process 12 on-study lab deviation cases. Agent must cross-reference
      dose modification tables, select correct action (hold/reduce/discontinue),
      assign urgency, and cite the protocol section. Tests numerical reasoning
      and multi-table lookup.
    max_steps: 12
    expected_baseline_score: 0.59
    grader: env/graders/lab_dose.py

  - id: sae_triage
    difficulty: hard
    description: >
      Triage 15 adverse event reports as SAE vs non-SAE, assign FDA reportability
      window, set urgency, and escalate to PI where needed. Includes deliberate
      traps (events that look serious but aren't, and vice versa). Asymmetric
      penalties for missed critical SAEs model real clinical risk.
    max_steps: 15
    expected_baseline_score: 0.36
    grader: env/graders/sae_triage.py

observation_space:
  type: ClinicalObservation
  fields:
    - patient_id: str
    - case_type: enum[eligibility_screen, adverse_event, protocol_deviation, lab_review, sae_report]
    - patient_data: PatientData
    - protocol_ref: ProtocolRef
    - case_notes: str
    - event_description: str | null
    - step_number: int
    - shift_cases_remaining: int

action_space:
  type: ClinicalAction
  fields:
    - decision: enum[enroll, screen_fail, hold_pending_review, dose_reduce_1_level,
                     dose_reduce_2_levels, dose_hold_temporary, dose_discontinue,
                     report_SAE, report_non_SAE_AE, protocol_deviation_minor,
                     protocol_deviation_major, escalate_to_PI, continue_no_action]
    - rationale: str
    - regulatory_citation: str | null
    - urgency: enum[routine, 24h, immediate]
    - follow_up_action: str | null
    - notify_irb: bool
    - notify_sponsor: bool

reward_range: [-0.20, 1.0]
seed: 42

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  tasks: GET  /tasks

runtime:
  max_inference_minutes: 15
  min_vcpu: 1
  min_memory_gb: 2
